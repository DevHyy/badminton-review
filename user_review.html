<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Community Reviews</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .hidden-section {
            display: none;
        }
    </style>
</head>
<!-- CONFIRM SUBMIT MODAL -->
<div id="confirmModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
    <div class="bg-white w-96 p-6 rounded-2xl shadow-xl text-center">
        <h3 class="text-lg font-semibold mb-4">Confirm Submission</h3>
        <p class="text-slate-500 mb-6">Are you sure you want to submit this review?</p>

        <div class="flex justify-center gap-4">
            <button onclick="closeConfirm()"
                    class="px-5 py-2 border rounded-lg hover:bg-slate-100">
                Cancel
            </button>
            <button onclick="processSubmit()"
                    class="px-5 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600">
                Yes, Submit
            </button>
        </div>
    </div>
</div>

<!-- LOADING MODAL -->
<div id="loadingModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
    <div class="bg-white w-96 p-6 rounded-2xl shadow-xl text-center">
        <h3 class="text-lg font-semibold mb-4 text-emerald-600">Submitting...</h3>

        <div class="w-full bg-slate-200 rounded-full h-3 overflow-hidden">
            <div id="progressBar"
                 class="h-3 bg-emerald-500 transition-all duration-300"
                 style="width:0%">
            </div>
        </div>

        <p class="text-slate-500 mt-4 text-sm">
            Please wait while we send your review to admin
        </p>
    </div>
</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
    <div class="bg-white w-96 p-6 rounded-2xl shadow-xl text-center">
        <div class="text-5xl mb-4">✅</div>
        <h3 class="text-lg font-semibold mb-2">Submitted Successfully!</h3>
        <p class="text-slate-500 mb-6">
            Your review has been sent to admin.<br>
            Please wait for approval.
        </p>
        <button onclick="closeSuccess()"
                class="px-6 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600">
            OK
        </button>
    </div>
</div>
<body class="bg-slate-50 min-h-screen">

<!-- HEADER -->
<div class="bg-white border-b shadow-sm">
    <div class="max-w-6xl mx-auto px-8 py-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold text-slate-800">Community Reviews</h1>
        <div class="space-x-4">
            <button onclick="showSubmit()"
                    class="px-4 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition">
                Submit Review
            </button>
            <button onclick="showView()"
                    class="px-4 py-2 border border-slate-300 rounded-lg hover:bg-slate-100 transition">
                View Reviews
            </button>
        </div>
    </div>
</div>

<div class="max-w-6xl mx-auto p-8">

    <!-- SUBMIT SECTION -->
    <div id="submitSection">

        <div class="bg-white p-8 rounded-2xl shadow-sm border">

            <h2 class="text-2xl font-semibold mb-6">Submit a Review</h2>

            <div class="grid md:grid-cols-2 gap-4">
                <input id="name" placeholder="Your name"
                       class="px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none">

                <select id="type"
                        class="px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none">
                    <option value="san">Sân</option>
                    <option value="host">Host</option>
                    <option value="shop">Shop</option>
                </select>
            </div>

            <div class="grid md:grid-cols-2 gap-4 mt-4">
                <input id="title" placeholder="Object name"
                       class="px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none">

                <input id="rating" type="number" min="0" max="10"
                       placeholder="Rating (0-10)"
                       class="px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none">
            </div>

            <textarea id="content" rows="4"
                      placeholder="Write detailed feedback..."
                      class="mt-4 w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none"></textarea>

            <input type="file" id="imageInput" accept="image/*" multiple class="mt-4">

            <div id="imagePreview" class="mt-4 flex gap-3 flex-wrap"></div>

            <button onclick="submitReview()"
                    class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl shadow transition">
                Submit Review
            </button>

        </div>
    </div>

    <!-- VIEW SECTION -->
    <div id="viewSection" class="hidden-section">

        <!-- STATS -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border mb-8">
            <div class="flex justify-between items-center">
                <div>
                    <div class="text-sm text-slate-500">Average Rating</div>
                    <div id="averageRating" class="text-3xl font-semibold text-emerald-600">0</div>
                </div>
                <div>
                    <div class="text-sm text-slate-500">Total Reviews</div>
                    <div id="totalReviews" class="text-3xl font-semibold">0</div>
                </div>
            </div>
        </div>

        <!-- FILTER -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border mb-8">
            <div class="grid md:grid-cols-3 gap-4">
                <select id="filterType" onchange="renderReviews()"
                        class="px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none">
                    <option value="san">Sân</option>
                    <option value="host">Host</option>
                    <option value="shop">Shop</option>
                </select>

                <input id="searchInput" oninput="renderReviews()"
                       placeholder="Search..."
                       class="px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none">

                <select id="sortSelect" onchange="renderReviews()"
                        class="px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none">
                    <option value="high">Rating High → Low</option>
                    <option value="low">Rating Low → High</option>
                    <option value="new">Newest</option>
                    <option value="old">Oldest</option>
                </select>
            </div>
        </div>

        <div id="reviewList" class="grid md:grid-cols-2 gap-6"></div>

        <!-- PAGINATION -->
        <div class="flex justify-center mt-8 gap-4">
            <button onclick="prevPage()" class="px-4 py-2 border rounded-lg">Previous</button>
            <button onclick="nextPage()" class="px-4 py-2 border rounded-lg">Next</button>
        </div>

    </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal"
     class="fixed inset-0 bg-black bg-opacity-90 hidden flex items-center justify-center z-50"
     onclick="outsideClick(event)">
    <button onclick="closeModal()" class="absolute top-6 right-8 text-white text-4xl">✕</button>
    <img id="modalImage" class="max-h-[85%] max-w-[90%] rounded-2xl shadow-2xl">
</div>

<script>
    let currentImages = [];
    let currentIndex = 0;
    let currentPage = 1;
    const perPage = 4;

    function showSubmit() {
        submitSection.style.display = "block";
        viewSection.style.display = "none";
    }

    function showView() {
        submitSection.style.display = "none";
        viewSection.style.display = "block";
        renderReviews();
    }

    document.getElementById("imageInput").addEventListener("change", function () {
        const preview = document.getElementById("imagePreview");
        preview.innerHTML = "";
        Array.from(this.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = e => {
                preview.innerHTML += `<img src="${e.target.result}" class="w-24 h-24 object-cover rounded-xl">`;
            };
            reader.readAsDataURL(file);
        });
    });

    function submitReview() {

        const userName = document.getElementById("name").value.trim();
        const reviewType = document.getElementById("type").value;
        const reviewTitle = document.getElementById("title").value.trim();
        const ratingValue = parseFloat(document.getElementById("rating").value);
        const reviewContent = document.getElementById("content").value.trim();
        const files = document.getElementById("imageInput").files;

        if (!userName || !reviewTitle || !reviewContent || isNaN(ratingValue) || ratingValue < 0 || ratingValue > 10) {
            alert("Please fill all fields correctly (0-10 rating)");
            return;
        }

        // Show confirm modal
        document.getElementById("confirmModal").classList.remove("hidden");

        // Save temporary data
        window.tempReviewData = {
            userName,
            reviewType,
            reviewTitle,
            ratingValue,
            reviewContent,
            files
        };
    }

    function renderReviews() {

        const type = filterType.value;
        const search = searchInput.value.toLowerCase();
        const sort = sortSelect.value;
        const list = reviewList;

        list.innerHTML = "";

        let storage = JSON.parse(localStorage.getItem("reviews")) || {
            pending: {san: [], host: [], shop: []},
            approved: {san: [], host: [], shop: []}
        };

        let data = [...storage.approved[type]];

        data = data.filter(r =>
            r.name.toLowerCase().includes(search) ||
            r.title.toLowerCase().includes(search) ||
            r.content.toLowerCase().includes(search)
        );

        if (sort === "high") data.sort((a, b) => b.rating - a.rating);
        if (sort === "low") data.sort((a, b) => a.rating - b.rating);
        if (sort === "new") data.sort((a, b) => new Date(b.date) - new Date(a.date));
        if (sort === "old") data.sort((a, b) => new Date(a.date) - new Date(b.date));

        document.getElementById("totalReviews").innerText = data.length;

        let avg = data.reduce((sum, r) => sum + r.rating, 0);
        document.getElementById("averageRating").innerText =
            data.length ? (avg / data.length).toFixed(1) : 0;

        const start = (currentPage - 1) * perPage;
        const paginated = data.slice(start, start + perPage);

        if (paginated.length === 0) {
            list.innerHTML = "<div class='col-span-2 text-center text-slate-500 py-16'>No reviews found</div>";
            return;
        }

        paginated.forEach(r => {
            list.innerHTML += `
<div class="bg-white p-6 rounded-2xl shadow-sm border hover:shadow-md transition">

<div class="flex justify-between items-start">
<div>
<div class="text-lg font-semibold">${r.title}</div>
<div class="text-sm text-slate-500 mt-1">${r.name}</div>
</div>
<div class="text-2xl font-bold text-emerald-600">${r.rating}</div>
</div>

<div class="mt-3 h-2 bg-slate-200 rounded-full">
<div class="h-2 bg-emerald-500 rounded-full" style="width:${r.rating * 10}%"></div>
</div>

<p class="mt-4 text-slate-600">${r.content}</p>

${r.images && r.images.length > 0 ? `
<div class="mt-4 flex gap-3 overflow-x-auto">
${r.images.map((img, index) => `
<img src="${img}"
onclick='openModal(${JSON.stringify(r.images)},${index})'
class="w-28 h-28 object-cover rounded-xl cursor-pointer hover:scale-105 transition">
`).join("")}
</div>` : ""}

<div class="text-xs text-slate-400 mt-3">${r.date}</div>

</div>`;
        });
    }

    function nextPage() {
        currentPage++;
        renderReviews();
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            renderReviews();
        }
    }
    function compressImage(file, maxWidth = 800, quality = 0.6) {
        return new Promise((resolve) => {

            const reader = new FileReader();

            reader.onload = function (e) {

                const img = new Image();

                img.onload = function () {

                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = height * (maxWidth / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;

                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL("image/jpeg", quality);

                    resolve(compressedBase64);
                };

                img.src = e.target.result;
            };

            reader.readAsDataURL(file);
        });
    }
    function openModal(images, index) {
        currentImages = images;
        currentIndex = index;
        modalImage.src = currentImages[currentIndex];
        imageModal.classList.remove("hidden");
    }

    function closeModal() {
        imageModal.classList.add("hidden");
    }

    function outsideClick(e) {
        if (e.target.id === "imageModal") closeModal();
    }

    document.addEventListener("keydown", e => {
        if (e.key === "Escape") closeModal();
    });

    function closeConfirm() {
        document.getElementById("confirmModal").classList.add("hidden");
    }

    function processSubmit() {
        closeConfirm();

        // LƯU NGAY
        saveReviewToStorage();

        const loadingModal = document.getElementById("loadingModal");
        const progressBar = document.getElementById("progressBar");

        loadingModal.classList.remove("hidden");

        let progress = 0;

        const interval = setInterval(() => {
            progress += 10;
            progressBar.style.width = progress + "%";

            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loadingModal.classList.add("hidden");
                    progressBar.style.width = "0%";
                    document.getElementById("successModal").classList.remove("hidden");
                }, 300);
            }
        }, 150);
    }

    function closeSuccess() {
        document.getElementById("successModal").classList.add("hidden");
        showSubmit();
    }

    async function saveReviewToStorage() {

        const {userName, reviewType, reviewTitle, ratingValue, reviewContent, files} = window.tempReviewData;

        let storage = JSON.parse(localStorage.getItem("reviews")) || {};

        storage.pending = storage.pending || {san:[],host:[],shop:[]};
        storage.approved = storage.approved || {san:[],host:[],shop:[]};
        storage.cancelled = storage.cancelled || {san:[],host:[],shop:[]};

        let imageArray = [];

        if (files.length > 0) {

            for (let i = 0; i < files.length; i++) {
                const compressed = await compressImage(files[i], 800, 0.6);
                imageArray.push(compressed);
            }
        }

        storage.pending[reviewType].push({
            name: userName,
            title: reviewTitle,
            rating: ratingValue,
            content: reviewContent,
            images: imageArray,
            date: new Date().toLocaleString()
        });

        await window.addDoc(window.collection(window.db, "reviews"), {
            name: userName,
            type: reviewType,
            title: reviewTitle,
            rating: ratingValue,
            content: reviewContent,
            images: imageArray,
            status: "pending",
            createdAt: new Date()
        });

        // reset form
        document.getElementById("name").value = "";
        document.getElementById("title").value = "";
        document.getElementById("rating").value = "";
        document.getElementById("content").value = "";
        document.getElementById("imageInput").value = "";
        document.getElementById("imagePreview").innerHTML = "";
    }
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAYnwLTROi60XU4H5AVwrRceHx-khUz_KY",
        authDomain: "badminton-review.firebaseapp.com",
        projectId: "badminton-review",
        storageBucket: "badminton-review.firebasestorage.app",
        messagingSenderId: "881736513353",
        appId: "1:881736513353:web:844f8afd61e43270298c98",
        measurementId: "G-M9ZMXEQ9H5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
</script>
</body>
</html>
