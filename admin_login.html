<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #00c853, #00b0ff);
            background-size: 200% 200%;
            animation: bgMove 12s ease infinite alternate;
        }
        @keyframes bgMove {
            0% { background-position: left top; }
            100% { background-position: right bottom; }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-10">

    <h1 class="text-2xl font-semibold text-slate-800 text-center mb-2">
        Admin Portal
    </h1>

    <p class="text-center text-slate-400 mb-8 text-sm">
        Secure authentication required
    </p>

    <div class="space-y-5">

        <input id="email"
               placeholder="Email address"
               class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 outline-none">

        <input id="password" type="password"
               placeholder="Password"
               class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 outline-none">

        <button onclick="login()"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-blue-500 text-white font-medium shadow-md hover:shadow-lg transition">
            Sign In
        </button>

        <p id="error" class="text-red-500 text-sm text-center hidden">
            Invalid credentials
        </p>

        <button onclick="goBack()"
                class="w-full text-slate-400 text-sm hover:underline">
            Back to Home
        </button>

    </div>

</div>

<script>

    function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const error = document.getElementById("error");

        const adminEmail = "admin@gmail.com";
        const adminPassword = "Qhuy9701";

        if (email === adminEmail && password === adminPassword) {

            // Lưu trạng thái đăng nhập
            localStorage.setItem("currentUser", JSON.stringify({
                role: "admin",
                email: email
            }));

            // Chuyển sang trang admin_main
            window.location.href = "admin_main.html";
        }
        else {
            error.classList.remove("hidden");
        }
    }

    function goBack() {
        window.location.href = "index.html";
    }

</script>

</body>
</html>
